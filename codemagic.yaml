workflows:
  android-apk:
    name: Build TERAHEADBMS APK
    max_build_duration: 30
    environment:
      node: 18
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Capacitor
        script: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Find and fix public directory
        script: |
          echo "=== Searching for index.html ==="
          find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/android/*"

          # Get the directory containing index.html
          INDEX_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/android/*" | head -1)
          WEB_DIR=$(dirname "$INDEX_PATH")
          echo "Found web assets at: $WEB_DIR"

          # If it's not already at ./public, copy it there
          if [ "$WEB_DIR" != "./public" ] && [ "$WEB_DIR" != "public" ]; then
            echo "Copying assets from $WEB_DIR to ./public ..."
            mkdir -p public
            cp -r "$WEB_DIR"/. ./public/
          fi

          echo "=== public/ contents ==="
          ls -la public/

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Allow HTTP (LAN) traffic
        script: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          XML

      - name: Build Debug APK
        script: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

