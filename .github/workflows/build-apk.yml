name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # ← allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build TERAHEADBMS APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout your code ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ──────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. Set up Java (required by Gradle / Android) ──────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Set up Android SDK ─────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm dependencies ───────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Install Capacitor ──────────────────────────────
      - name: Install Capacitor packages
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── 7. Init Capacitor (only needed the first time) ────
      #       If android/ folder is already committed, skip this.
      - name: Initialize Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init TERAHEADBMS com.terahead.bms --web-dir public
          fi

      # ── 8. Add Android platform if not already added ──────
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # ── 9. Sync web assets into Android project ───────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Allow cleartext (http) traffic for LAN access ─
      - name: Patch network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF

      # ── 11. Make Gradle wrapper executable ────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 12. Build the debug APK ───────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 13. Upload APK as a downloadable artifact ─────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TERAHEADBMS-v2.0-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # APK stays downloadable for 30 days
