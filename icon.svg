<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="spade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Outer ring accent -->
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.35"/>

  <!-- Spade symbol centred -->
  <!-- Spade = two circles + triangle top, stem+base bottom -->
  <!-- Top circle (left) -->
  <circle cx="196" cy="230" r="90" fill="url(#spade)"/>
  <!-- Top circle (right) -->
  <circle cx="316" cy="230" r="90" fill="url(#spade)"/>
  <!-- Top triangle point -->
  <polygon points="256,100 196,230 316,230" fill="url(#spade)"/>
  <!-- Body fill to merge circles -->
  <rect x="196" y="230" width="120" height="60" fill="url(#spade)"/>
  <!-- Stem -->
  <rect x="236" y="285" width="40" height="70" rx="8" fill="url(#spade)"/>
  <!-- Base -->
  <rect x="186" y="345" width="140" height="36" rx="14" fill="url(#spade)"/>

  <!-- Small bar chart bottom-right corner — represents BMS -->
  <rect x="338" y="380" width="20" height="52" rx="5" fill="#00d4aa" opacity="0.85"/>
  <rect x="364" y="360" width="20" height="72" rx="5" fill="#4f7cff" opacity="0.85"/>
  <rect x="390" y="370" width="20" height="62" rx="5" fill="#7c5cff" opacity="0.85"/>
</svg>
